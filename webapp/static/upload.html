<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zədə analizi — CrashLogic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%236a5cff'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial'>✦</text></svg>">
</head>
<body>
<div class="app-frame">

  <!-- ============ SIDEBAR ============ -->
  <aside class="app-side">
    <a class="side-brand brand" href="index.html">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4z"/></svg>
      </span>
      CrashLogic
    </a>
    <div class="side-tagline" data-i18n="tagline"></div>

    <nav class="side-nav">
      <a href="upload.html" class="active">
        <span class="nav-ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4z"/></svg></span>
        <span data-i18n="nav_analyze"></span>
      </a>
      <a href="chat.html">
        <span class="nav-ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.5 8.5 0 01-8.5 8.5 8.4 8.4 0 01-3.9-.9L3 20l1-4.5A8.5 8.5 0 1121 11.5z"/></svg></span>
        <span data-i18n="nav_chat"></span>
      </a>
    </nav>
  </aside>

  <!-- ============ TOPBAR ============ -->
  <header class="app-top">
    <nav class="top-links"></nav>
    <div class="top-tools">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button class="active" data-lang="az">AZ</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <!-- ============ MAIN ============ -->
  <main class="app-main">
    <div class="main-head">
      <h1 data-i18n="page_title"></h1>
      <div class="step-pills">
        <span class="pill active"><span class="p-num">1</span> <span data-i18n="step1"></span></span>
        <span class="pill"><span class="p-num">2</span></span>
      </div>
    </div>

    <div class="upload-stage" id="dropzone">
      <div class="upload-copy">
        <h2 data-i18n="upload_h2"></h2>
        <div class="u-format" data-i18n="upload_format"></div>
        <button class="btn btn-ghost" id="upload-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          <span data-i18n="upload_btn"></span>
        </button>
        <input type="file" id="file-input" class="file-input-hidden" accept="image/png,image/jpeg" multiple>

        <form class="vehicle-form" id="vehicle-form">
          <div class="field-row">
            <label class="field"><span data-i18n="brand"></span>
              <select id="sel-brand"></select>
            </label>
            <label class="field"><span data-i18n="model"></span>
              <select id="sel-model"></select>
            </label>
            <label class="field"><span data-i18n="year"></span>
              <select id="sel-year"></select>
            </label>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="btn-analyze" disabled>
            <span class="spinner" hidden></span>
            <span data-i18n="analyze"></span>
          </button>
          <p class="error-box" id="analyze-error" hidden></p>
        </form>

        <p class="u-note" data-i18n="upload_note"></p>
      </div>

      <div class="upload-strip" id="upload-strip"></div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
